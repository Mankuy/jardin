<script>
// ══════════════════════════════════════════════════
//  IA — Puter.js (GRATIS, ILIMITADA y AUTOMÁTICA)
// ══════════════════════════════════════════════════
async function aiAutofill() {
  const strainName = document.getElementById('ai-strain-name').value.trim();
  const source     = document.getElementById('ai-strain-source').value.trim();
  const errEl      = document.getElementById('ai-error');
  const btn        = document.getElementById('ai-btn');
  const btnTxt     = document.getElementById('ai-btn-text');
  errEl.style.display = 'none';

  if (!strainName) { 
    errEl.textContent = '⚠ Ingresá el nombre de la cepa.'; 
    errEl.style.display = 'block'; 
    return; 
  }

  btn.disabled = true; 
  btnTxt.innerHTML = '⏳ Buscando con Puter AI (gratis e ilimitado)...';

  const prompt = `Eres un experto en cannabis. Cepa: "${strainName}"${source?`. Fuente: "${source}"`:''}.
Si no tenés información de algún campo, inferí desde los parentales. Nunca dejes un campo vacío.
Respondé SOLO con JSON válido, sin markdown. Todo en español salvo nombres propios:
{"nombre":"nombre exacto","sativa":50,"indica":50,"thc":"20%","floracion":"8-9 semanas","origen":"Parent A x Parent B","breeder":"nombre banco","aroma":"aromas principales","gusto":"sabor al fumar","efecto":"efectos principales","colorHoja":"color de hojas","perfil":"2-3 oraciones sobre crecimiento y características"}
Si la cepa no existe devolvé {"error":"Cepa no encontrada"}.`;

  try {
    // IA Puter.js (gratis, ilimitada, sin clave)
    let txt = await puter.ai.chat(prompt, { model: "gpt-5-nano" });
    
    // Normalizamos la respuesta (puede venir como string o objeto)
    if (typeof txt !== "string") {
      txt = txt?.text || txt?.content || JSON.stringify(txt);
    }

    // Parsing JSON robusto (igual que antes)
    let parsed;
    try { parsed = JSON.parse(txt); }
    catch(e1) {
      try { parsed = JSON.parse(txt.replace(/```json|```/g,'').trim()); }
      catch(e2) {
        const s = txt.indexOf('{'), e = txt.lastIndexOf('}');
        if (s === -1) throw new Error('Respuesta inválida');
        parsed = JSON.parse(txt.slice(s, e+1));
      }
    }

    if (parsed.error) throw new Error(parsed.error);

    // Llenado de campos
    document.getElementById('mp-nombre').value    = parsed.nombre    || strainName;
    if (parsed.thc)       document.getElementById('mp-thc').value       = parsed.thc;
    if (parsed.floracion) document.getElementById('mp-floracion').value = parsed.floracion;
    if (parsed.origen)    document.getElementById('mp-origen').value    = parsed.origen;
    if (parsed.breeder)   document.getElementById('mp-breeder').value   = parsed.breeder;
    if (parsed.aroma)     document.getElementById('mp-aroma').value     = parsed.aroma;
    if (parsed.gusto)     document.getElementById('mp-gusto').value     = parsed.gusto;
    if (parsed.efecto)    document.getElementById('mp-efecto').value    = parsed.efecto;
    if (parsed.colorHoja) document.getElementById('mp-colorhoja').value = parsed.colorHoja;
    if (parsed.perfil)    document.getElementById('mp-perfil').value    = parsed.perfil;

    const sativaVal = Math.min(100, Math.max(0, parseInt(parsed.sativa) || 50));
    document.getElementById('mp-sativa').value = sativaVal; 
    updSativa();

    showToast('✓ Datos cargados GRATIS con Puter AI (ilimitado)');

  } catch(e) {
    errEl.textContent = '⚠ ' + (e.message || 'Error. Probá de nuevo.');
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; 
    btnTxt.textContent = '✦ Buscar y cargar datos';
  }
}

// ══════════════════════════════════════════════════

  const session = localStorage.getItem('jd_session');
  if (session) {
    document.getElementById('login-user').value = session;
    setTimeout(() => document.getElementById('login-pass').focus(), 300);
  }
  document.getElementById('auth-screen').classList.remove('hidden');
});
</script>
